<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - CineTop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; }

        .admin-login { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea, #764ba2); position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000; }
        .login-card { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 40px; width: 90%; max-width: 400px; }
        .login-card h2 { color: #333; text-align: center; margin-bottom: 30px; }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; }
        .login-card button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        .error-msg { color: #e74c3c; text-align: center; margin-top: 15px; }

        .admin-container { display: none; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .header h1 { font-size: 24px; }
        .logout-btn { background: #e74c3c; padding: 10px 20px; border: none; border-radius: 5px; color: white; cursor: pointer; }

        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; text-align: center; }
        .stat-number { font-size: 36px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 14px; opacity: 0.8; margin-top: 5px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: rgba(255,255,255,0.1); padding: 12px 24px; border: none; border-radius: 5px; color: white; cursor: pointer; }
        .tab-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); }
        .tab-content { display: none; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 20px; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border-radius: 5px; background: rgba(255,255,255,0.9); border: none; }

        button { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button.danger { background: #e74c3c; }
        button.success { background: #27ae60; }

        .items-list { margin-top: 30px; max-height: 500px; overflow-y: auto; }
        .item-card { background: rgba(255,255,255,0.1); padding: 15px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .item-info { flex: 1; }
        .item-title { font-weight: bold; font-size: 18px; }
        .item-meta { font-size: 12px; color: #ccc; }
        .item-actions { display: flex; gap: 10px; }

        .upload-area { background: rgba(255,255,255,0.05); border: 2px dashed #667eea; border-radius: 16px; padding: 30px; text-align: center; margin-bottom: 30px; }
        .upload-btn { background: linear-gradient(135deg, #667eea, #764ba2); padding: 12px 28px; border-radius: 50px; margin: 10px; }
        .file-info { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; margin-top: 20px; display: none; }
        .file-info.show { display: block; }
        .preview-box { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; margin-top: 15px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .preview-box pre { color: #0f0; margin: 0; white-space: pre-wrap; }
        .status-msg { padding: 12px; border-radius: 8px; margin: 10px 0; }
        .status-success { background: #27ae60; }
        .status-error { background: #e74c3c; }
        .status-info { background: #3498db; }

        @media (max-width: 768px) { .admin-container { padding: 10px; } .item-card { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

<div class="admin-login" id="adminLogin">
    <div class="login-card">
        <h2>Painel Administrativo</h2>
        <form id="loginForm">
            <input type="text" id="adminUser" placeholder="Usuario Admin" required>
            <input type="password" id="adminPass" placeholder="Senha" required>
            <button type="submit">Entrar</button>
            <div class="error-msg" id="loginError"></div>
        </form>
        <p style="text-align: center; margin-top: 15px; color: #666;">admin / admin123</p>
    </div>
</div>

<div class="admin-container" id="adminContainer">
    <div class="header">
        <h1>Painel Administrativo - CineTop</h1>
        <button class="logout-btn" id="logoutBtn">Sair</button>
    </div>

    <div class="stats-container">
        <div class="stat-card"><div class="stat-number" id="totalFilmesStat">0</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-number" id="totalFilmesOnly">0</div><div class="stat-label">Filmes</div></div>
        <div class="stat-card"><div class="stat-number" id="totalSeriesOnly">0</div><div class="stat-label">Series</div></div>
        <div class="stat-card"><div class="stat-number" id="totalUsuariosStat">0</div><div class="stat-label">Usuarios</div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="filmes">Gerenciar Conteudos</button>
        <button class="tab-btn" data-tab="usuarios">Gerenciar Usuarios</button>
    </div>

    <div class="tab-content active" id="tabFilmes">
        <div class="upload-area">
            <h3>Carregar Arquivo JSON</h3>
            <p>Selecione o arquivo <strong>filmes.json</strong> (ou qualquer JSON valido)</p>
            <input type="file" id="fileInput" accept=".json" style="display: none;">
            <button class="upload-btn" onclick="abrirSeletor()">Selecionar Arquivo</button>
            <div id="fileInfo" class="file-info">
                <strong>Arquivo selecionado:</strong><br><span id="fileName"></span><br><br>
                <button onclick="carregarArquivo()" class="success">Carregar</button>
                <button onclick="cancelarSelecao()" class="danger">Cancelar</button>
            </div>
            <div id="statusArea"></div>
            <div id="previewArea" style="display: none;"><div class="preview-box"><strong>Preview:</strong><div id="previewContent"></div></div></div>
        </div>

        <h2>Conteudos Carregados</h2>
        <div class="items-list" id="filmesList"></div>
        
        <hr style="margin: 30px 0;">
        <h2>Adicionar Manualmente</h2>
        <form id="addFilmeForm">
            <div class="form-group"><label>Tipo</label><select id="tipo"><option value="filme">Filme</option><option value="serie">Serie</option></select></div>
            <div class="form-group"><label>Titulo</label><input type="text" id="title" required></div>
            <div class="form-group"><label>Descricao</label><textarea id="description" required></textarea></div>
            <div class="form-group"><label>URL do Video</label><input type="url" id="video_url" required></div>
            <div class="form-group"><label>Duracao</label><input type="text" id="duration" required></div>
            <div class="form-group"><label>Ano</label><input type="text" id="release_year" required></div>
            <div class="form-group"><label>Categorias</label><input type="text" id="categories" required></div>
            <div class="form-group"><label>Elenco</label><input type="text" id="cast" placeholder="Ator1, Ator2"></div>
            <button type="submit">Adicionar</button>
        </form>
        
        <div style="margin-top: 20px;"><button onclick="exportarFilmes()">Exportar JSON</button><button onclick="limparCatalogo()" class="danger">Limpar</button></div>
    </div>

    <div class="tab-content" id="tabUsuarios">
        <h2>Criar Usuario</h2>
        <form id="addUsuarioForm">
            <div class="form-group"><label>Usuario</label><input type="text" id="username" required></div>
            <div class="form-group"><label>Senha</label><input type="password" id="password" required></div>
            <button type="submit">Criar</button>
        </form>
        <h2 style="margin-top: 30px;">Usuarios</h2>
        <div class="items-list" id="usuariosList"></div>
    </div>
</div>

<script>
    const ADMIN_CREDENTIALS = { username: "admin", password: "admin123" };
    let filmesData = [], usuariosData = [], arquivoTemp = null;

    function atualizarStats() {
        document.getElementById('totalFilmesStat').textContent = filmesData.length;
        document.getElementById('totalFilmesOnly').textContent = filmesData.filter(f => f.tipo === 'filme').length;
        document.getElementById('totalSeriesOnly').textContent = filmesData.filter(f => f.tipo === 'serie').length;
        document.getElementById('totalUsuariosStat').textContent = usuariosData.length;
    }

    function mostrarStatus(msg, tipo) {
        const area = document.getElementById('statusArea');
        area.innerHTML = `<div class="status-msg status-${tipo}">${msg}</div>`;
        setTimeout(() => { if(area.innerHTML.includes(msg)) area.innerHTML = ''; }, 5000);
    }

    window.abrirSeletor = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(!file) return;
        arquivoTemp = file;
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('fileInfo').classList.add('show');
        mostrarStatus(`Arquivo "${file.name}" selecionado.`, 'info');
    });

    window.cancelarSelecao = () => {
        arquivoTemp = null;
        document.getElementById('fileInput').value = '';
        document.getElementById('fileInfo').classList.remove('show');
        document.getElementById('previewArea').style.display = 'none';
    };

    window.carregarArquivo = () => {
        if(!arquivoTemp) { mostrarStatus('Nenhum arquivo selecionado!', 'error'); return; }
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                let jsonData = JSON.parse(e.target.result);
                if(!Array.isArray(jsonData)) jsonData = [jsonData];
                filmesData = jsonData;
                salvarFilmes();
                document.getElementById('previewContent').innerHTML = `<pre>${JSON.stringify(jsonData, null, 2).substring(0, 1500)}${JSON.stringify(jsonData, null, 2).length > 1500 ? '\n...' : ''}</pre>`;
                document.getElementById('previewArea').style.display = 'block';
                mostrarStatus(`Sucesso! ${filmesData.length} itens carregados.`, 'success');
                cancelarSelecao();
            } catch(error) { mostrarStatus(`Erro: ${error.message}`, 'error'); }
        };
        reader.onerror = () => mostrarStatus('Erro ao ler arquivo.', 'error');
        reader.readAsText(arquivoTemp);
    };

    function salvarFilmes() { localStorage.setItem('cine_filmes', JSON.stringify(filmesData)); renderizarFilmes(); atualizarStats(); }
    function salvarUsuarios() { localStorage.setItem('cine_usuarios', JSON.stringify(usuariosData)); renderizarUsuarios(); atualizarStats(); }

    function renderizarFilmes() {
        const list = document.getElementById('filmesList');
        if(!filmesData.length) { list.innerHTML = '<p>Nenhum conteudo. Carregue um JSON.</p>'; return; }
        list.innerHTML = filmesData.map((f, i) => `<div class="item-card"><div class="item-info"><div class="item-title">${escapeHtml(f.title)}</div><div class="item-meta">${f.tipo} | ${f.duration||'N/A'} | ${f.release_year||'N/A'}</div></div><div class="item-actions"><button onclick="editarFilme(${i})">Editar</button><button class="danger" onclick="excluirFilme(${i})">Excluir</button></div></div>`).join('');
    }

    function renderizarUsuarios() {
        const list = document.getElementById('usuariosList');
        if(!usuariosData.length) { list.innerHTML = '<p>Nenhum usuario.</p>'; return; }
        list.innerHTML = usuariosData.map((u, i) => `<div class="item-card"><div class="item-info"><div class="item-title">${escapeHtml(u.username)}</div></div><div class="item-actions"><button class="danger" onclick="excluirUsuario(${i})">Excluir</button></div></div>`).join('');
    }

    window.excluirFilme = (i) => { if(confirm('Excluir?')) { filmesData.splice(i,1); salvarFilmes(); } };
    window.editarFilme = (i) => { const novo = prompt('Novo titulo:', filmesData[i].title); if(novo) { filmesData[i].title = novo; salvarFilmes(); } };
    window.limparCatalogo = () => { if(confirm('Limpar tudo?')) { filmesData = []; salvarFilmes(); document.getElementById('previewArea').style.display = 'none'; } };
    window.exportarFilmes = () => { const blob = new Blob([JSON.stringify(filmesData, null, 2)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'filmes.json'; a.click(); URL.revokeObjectURL(a.href); mostrarStatus('Exportado!','success'); };
    window.excluirUsuario = (i) => { if(confirm('Excluir usuario?')) { usuariosData.splice(i,1); salvarUsuarios(); } };

    document.getElementById('addFilmeForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const castInput = document.getElementById('cast').value;
        filmesData.push({ id: Date.now().toString(), tipo: document.getElementById('tipo').value, title: document.getElementById('title').value, description: document.getElementById('description').value, video_url: document.getElementById('video_url').value, duration: document.getElementById('duration').value, release_year: document.getElementById('release_year').value, categories: document.getElementById('categories').value, cast: castInput ? castInput.split(',').map(c=>c.trim()) : [], lang: 'Portugues' });
        salvarFilmes();
        e.target.reset();
        mostrarStatus('Adicionado!','success');
    });

    document.getElementById('addUsuarioForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        if(usuariosData.some(u=>u.username===username)) { alert('Usuario existe!'); return; }
        usuariosData.push({ id: Date.now(), username, password: document.getElementById('password').value });
        salvarUsuarios();
        e.target.reset();
        alert('Usuario criado!');
    });

    function carregarDados() {
        const stored = localStorage.getItem('cine_filmes');
        filmesData = stored ? JSON.parse(stored) : [];
        const storedUsers = localStorage.getItem('cine_usuarios');
        usuariosData = storedUsers ? JSON.parse(storedUsers) : [{ id: 1, username: "usuario1", password: "123456" }];
        renderizarFilmes(); renderizarUsuarios(); atualizarStats();
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        if(document.getElementById('adminUser').value === ADMIN_CREDENTIALS.username && document.getElementById('adminPass').value === ADMIN_CREDENTIALS.password) {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminContainer').style.display = 'block';
            carregarDados();
        } else document.getElementById('loginError').textContent = 'Credenciais invalidas!';
    });

    document.getElementById('logoutBtn').addEventListener('click', () => { document.getElementById('adminLogin').style.display = 'flex'; document.getElementById('adminContainer').style.display = 'none'; });
    document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); btn.classList.add('active'); document.getElementById(`tab${btn.dataset.tab.charAt(0).toUpperCase()+btn.dataset.tab.slice(1)}`).classList.add('active'); }); });
    function escapeHtml(t) { if(!t) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
</script>
</body>
</html>
